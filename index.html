<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    height:100vh;

    /* Ảnh nền demo */
    background:url('https://images.pexels.com/photos/9694475/pexels-photo-9694475.jpeg') center/cover no-repeat;
}

/* Overlay */
.overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.55);
    backdrop-filter:blur(8px);
    padding: 48px 22px;
    display:flex;
    justify-content:center;
    align-items:center;

    z-index:999;
}

/* Popup */
.modal{
    width:420px;
    background:#050505;
    color:#fff;

    border-radius:8px;
    padding:30px 25px;

    text-align:center;

    box-shadow:0 0 30px rgba(0,0,0,0.5);
}

/* Text */
.modal p{
    font-size:15px;
    line-height:1.7;
    color:#f1f1f1;
    margin-bottom:20px;
}

/* Button group */
.btn-group{
    display:flex;
    justify-content:center;
    gap:15px;
    margin-top:10px;
    margin-bottom:25px;
}

/* Buttons */
.btn{
    text-decoration:none;
    padding:12px 54px;
    border-radius:9px;

    font-size:15px;
    font-weight:bold;

    transition:0.25s ease;
}

/* Accept */
.accept{
    background:#ff1493;
    color:#fff;
}

.accept:hover{
    background:#ff3ca8;
    transform:scale(1.05);
}

/* Decline */
.decline{
    background:#2b2b2b;
    color:#fff;
}

.decline:hover{
    background:#444;
    transform:scale(1.05);
}

/* Footer */
.footer{
    border-top:1px solid #222;
    padding-top:18px;

    color:#aaa;
    font-size:14px;
}

/* Logo */
.logo{
    margin-top:8px;
    font-size:42px;
    font-weight:900;
    letter-spacing:2px;
    color:#fff;
}

</style>
</head>

<body>

<!-- Popup -->
<div class="overlay">

    <div class="modal">

        <p>
            <strong>
                Nội dung chỉ dành cho người trưởng thành.
            </strong>

        </p>

        <p>
            Vui lòng xác nhận độ tuổi của bạn để tiếp tục truy cập...
        </p>

        <!-- Buttons -->
        <div class="btn-group">

            <!-- Link Accept -->
            <a href="https://t.me/+mAQE6WTUxqtmMjhl"
               class="btn accept">

               XÁC NHẬN

            </a>

        </div>

        <!-- Footer -->
        <div class="footer">
            © 2026 返现
            <div class="logo">
                RTA
            </div>

        </div>

    </div>

</div>

</body>
